name: CI - Scratch - Validation & Build

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "develop"
  pull_request:
    branches:
      - "develop"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  security-and-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Requis par SonarQube pour avoir l'historique Git complet

      - name: Scan de secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: HEAD
          extra_args: --debug

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Audit des dépendances (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc --format=markdown
        continue-on-error: true

      - name: Tests & Génération de couverture (pytest)
        run: |
          pip install pytest pytest-cov
          pytest -v --cov=app --cov-report=xml # xml requis pour SonarQube

      - name: Analyse SAST & Qualité (SonarQube)
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ github.event.repository.name }}
            -Dsonar.organization=devsecops-lab-training
            -Dsonar.sources=app/
            -Dsonar.tests=tests/
            -Dsonar.python.version=3.12
            -Dsonar.python.coverage.reportPaths=coverage.xml

  dockerfile-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Dockerfile (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          no-fail: false

  build-scan-publish-scratch:
    needs: [security-and-quality, dockerfile-lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Définir un tag unique pour ce run
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "SCRATCH_TAG=scratch-${{ github.run_number }}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion au registre GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image locale (pour scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: scan-target:latest
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.SCRATCH_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan de l'image (Grype)
        uses: anchore/scan-action@v5
        with:
          image: "scan-target:latest"
          fail-build: false # Permet de créer et publier l'image dans toutes les conditions
          severity-cutoff: "high"

      - name: Smoke test du conteneur
        run: |
          docker run -d --name smoke-test -p 8000:8000 scan-target:latest
          echo "Attente du démarrage..."
          sleep 10
          echo "--- Logs du conteneur ---"
          docker logs smoke-test
          echo "--- Test de l'endpoint /health ---"
          curl -sf http://localhost:8000/health
          docker stop smoke-test
          docker rm smoke-test

      - name: Build et push image scratch
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.SCRATCH_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scratch-latest
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.SCRATCH_TAG }}
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=Image scratch de démonstration/training (Grype/Sonar)
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Installer Cosign
        uses: sigstore/cosign-installer@v3.6.0

      - name: Signer les images avec Cosign (keyless, OIDC GitHub)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.SCRATCH_TAG }}
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scratch-latest

      - name: Vérifier la signature Cosign
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.SCRATCH_TAG }}

      - name: Résumé de publication
        run: |
          echo "Image scratch publiée avec succès (Scan Grype effectué) :"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.SCRATCH_TAG }}"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scratch-latest"