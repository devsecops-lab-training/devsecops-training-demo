name: CI - Validation

# CI = "est-ce que le code est bon ?"
# Se déclenche sur toute branche de travail ET sur les Pull Requests
# vers develop ou main. Ne publie JAMAIS d'artefact.
on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "develop"
  pull_request:
    branches:
      - "develop"
      - "master"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Tests (pytest)
        run: pytest -v

      - name: Build Docker (validation uniquement, pas de push)
        run: docker build -t ci-validation:${{ github.sha }} .
