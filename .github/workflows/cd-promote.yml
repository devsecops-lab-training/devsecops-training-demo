name: CD - Promote Staging to Stable

# Promotion = acte volontaire des Ops, déclenché manuellement APRES la merge
# de develop vers master. AUCUN build ici : on copie l'image
# octet pour octet avec skopeo, ce qui préserve le digest SHA256 à
# l'identique. C'est la preuve qu'on déploie en prod EXACTEMENT ce qui a
# été validé en staging.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version à promouvoir (ex: 1.0.0), doit déjà exister en staging"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment: production
    steps:
      - name: Installer skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo

      - name: Connexion au registre GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

      - name: Copier l'image staging -> stable (copie bit-à-bit, aucun rebuild)
        run: |
          skopeo copy --all \
            docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.event.inputs.version }} \
            docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable-${{ github.event.inputs.version }}

          skopeo copy --all \
            docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.event.inputs.version }} \
            docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable-latest

      - name: Vérifier que les digests sont identiques
        run: |
          DIGEST_STAGING=$(skopeo inspect \
            docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.event.inputs.version }} \
            | jq -r '.Digest')
          DIGEST_STABLE=$(skopeo inspect \
            docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable-${{ github.event.inputs.version }} \
            | jq -r '.Digest')
          echo "Digest staging : $DIGEST_STAGING"
          echo "Digest stable  : $DIGEST_STABLE"
          if [ "$DIGEST_STAGING" != "$DIGEST_STABLE" ]; then
            echo "ERREUR : les digests diffèrent, la promotion n'a pas préservé l'artefact !"
            exit 1
          fi
          echo "OK : artefact identique, promotion validée sans reconstruction."