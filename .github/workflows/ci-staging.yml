name: CI - Staging - Build & Publish

# Staging doit être AU MOINS aussi strict que Scratch, idéalement plus :
# c'est la dernière étape qui construit réellement l'artefact. Cet artefact
# sera ensuite promu en Stable SANS jamais être reconstruit (skopeo copy).
# Donc tout défaut non détecté ici se retrouve directement en production.
#
# Différence volontaire avec ci.yml (Scratch) :
# - pip-audit et Bandit sont ici BLOQUANTS (pas de continue-on-error).
# - Aucune tolérance "c'est juste une démo" : c'est la version candidate
#   à la promotion.
#
# Se déclenche UNIQUEMENT sur un tag Git de la forme vX.Y.Z, posé sur develop.

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────
  # JOB 1 : Validation du code (lint + tests)
  # ───────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          ruff check app/ tests/
          ruff format --check app/ tests/

      - name: Tests (pytest)
        run: pytest -v

  # ───────────────────────────────────────────────
  # JOB 2 : Sécurité du code - BLOQUANT (contrairement à Scratch)
  # ───────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan de secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: HEAD
          extra_args: --debug

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Audit des dépendances (pip-audit) - BLOQUANT
        # Pas de continue-on-error ici : en Staging, une dépendance
        # vulnérable connue doit arrêter la chaîne, pas juste informer.
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc

      - name: SAST Python (Bandit) - BLOQUANT
        run: |
          pip install "bandit[toml]"
          bandit -r app/ -ll

      - name: Lint Dockerfile (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          no-fail: false

  # ───────────────────────────────────────────────
  # JOB 3 : Build, Scan, Publish & Sign - le SEUL build de ce cycle
  # ───────────────────────────────────────────────
  build-scan-publish-staging:
    needs: [validate, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extraire la version depuis le tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion au registre GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image locale (pour scan, pas encore publiée)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: |
            scan-target:latest
          build-args: |
            APP_VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan de l'image (Trivy) - BLOQUANT
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "scan-target:latest"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Smoke test du conteneur
        run: |
          docker run -d --name smoke-test -p 8000:8000 scan-target:latest
          echo "Attente du démarrage..."
          sleep 10
          echo "--- Logs du conteneur ---"
          docker logs smoke-test
          echo "--- Test de l'endpoint /health ---"
          curl -sf http://localhost:8000/health
          docker stop smoke-test
          docker rm smoke-test

      - name: Build et push - tag staging
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          build-args: |
            APP_VERSION=${{ steps.version.outputs.VERSION }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ steps.version.outputs.VERSION }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}

      - name: Installer Cosign
        uses: sigstore/cosign-installer@v3.6.0

      - name: Signer l'image avec Cosign (keyless, OIDC GitHub)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ steps.version.outputs.VERSION }}

      - name: Vérifier la signature Cosign
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ steps.version.outputs.VERSION }}

      - name: Résumé
        run: |
          echo "Image publiée et signée : ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ steps.version.outputs.VERSION }}"
          echo "Cette image est candidate à la promotion en stable, SANS reconstruction."
